# --- Scoring Weights (must sum to ~0.90, recency adds +0.10 on top) ---
weights:
  skills: 0.20
  title: 0.20
  skills: 0.25        # Skill keyword overlap (hard filter against physics/unrelated jobs)
  semantic: 0.30      # Embedding similarity (broad relevance, reduced to avoid false positives)
  location: 0.10
  experience: 0.05    # life-story TF-IDF (lightweight supplement)
  seniority: 0.15     # penalize jobs that require higher seniority than preferred
  recency: 0.03       # reduced impact of posting date

